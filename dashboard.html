<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800 hidden" id="main-body">
    <div class="max-w-5xl mx-auto p-4 md:p-8">
        
        <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Dashboard</h1>
                <p id="user-email-display" class="text-sm text-gray-500"></p>
            </div>
            <button id="logout-btn" class="bg-red-50 text-red-500 font-bold px-6 py-2 rounded-lg hover:bg-red-500 hover:text-white transition">Logout</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center">
            <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-blue-500">
                <h3 class="text-gray-500 text-sm mb-2">Total Balance</h3>
                <p id="total-balance" class="text-3xl font-bold">₹0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-green-500">
                <h3 class="text-gray-500 text-sm mb-2">Total Income</h3>
                <p id="total-income" class="text-3xl font-bold text-green-500">₹0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-red-500">
                <h3 class="text-gray-500 text-sm mb-2">Total Expense</h3>
                <p id="total-expense" class="text-3xl font-bold text-red-500">₹0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-8">
                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <h2 class="text-xl font-bold mb-4">Add Transaction</h2>
                    <input id="t-text" type="text" placeholder="Description" class="w-full mb-4 p-3 border rounded-lg bg-gray-50">
                    <input id="t-amount" type="number" placeholder="Amount (₹)" class="w-full mb-4 p-3 border rounded-lg bg-gray-50">
                    <select id="t-type" class="w-full mb-4 p-3 border rounded-lg bg-gray-50">
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                    <select id="t-category" class="w-full mb-6 p-3 border rounded-lg bg-gray-50">
                        <option value="Food">Food</option>
                        <option value="Rent">Rent</option>
                        <option value="Education">Education</option>
                        <option value="Other">Other</option>
                    </select>
                    <button id="add-btn" class="w-full bg-blue-600 text-white font-bold p-3 rounded-lg hover:bg-blue-700">Add</button>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <h2 class="text-xl font-bold mb-4">Breakdown</h2>
                    <canvas id="expenseChart" class="w-full"></canvas>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-xl shadow-sm h-full">
                    <h2 class="text-xl font-bold mb-4">Recent Transactions</h2>
                    <ul id="transaction-list" class="divide-y divide-gray-100 pr-2 overflow-y-auto" style="max-height: 500px;">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCokcEV6AiJ0CmyaYR6JfEgOsKkE9u0Tkc",
            authDomain: "smart-expense-tracker-4259b.firebaseapp.com",
            projectId: "smart-expense-tracker-4259b",
            storageBucket: "smart-expense-tracker-4259b.firebasestorage.app",
            messagingSenderId: "557470525394",
            appId: "1:557470525394:web:41794b398ee34e92108a0b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let expenseChartInstance = null;

        // Security Check: Ensure user is logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-email-display').innerText = user.email;
                document.getElementById('main-body').classList.remove('hidden'); // Show page
                loadTransactions();
            } else {
                window.location.href = 'login.html'; // Kick out to login
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth);
        });

        // Add Transaction
        document.getElementById('add-btn').addEventListener('click', async () => {
            const text = document.getElementById('t-text').value;
            const amount = Number(document.getElementById('t-amount').value);
            const type = document.getElementById('t-type').value;
            const category = document.getElementById('t-category').value;

            if (text && amount) {
                await addDoc(collection(db, "transactions"), {
                    userId: currentUser.uid, text, amount, type, category, createdAt: new Date().getTime()
                });
                document.getElementById('t-text').value = '';
                document.getElementById('t-amount').value = '';
            }
        });

        function loadTransactions() {
            const q = query(collection(db, "transactions"), where("userId", "==", currentUser.uid), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (querySnapshot) => {
                const list = document.getElementById('transaction-list');
                list.innerHTML = ''; 
                
                let income = 0; let expense = 0; let categoryTotals = {}; 

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const txId = doc.id;
                    
                    if(data.type === 'income') income += data.amount;
                    else {
                        expense += data.amount;
                        categoryTotals[data.category] = (categoryTotals[data.category] || 0) + data.amount;
                    }

                    const sign = data.type === 'income' ? '+' : '-';
                    const colorClass = data.type === 'income' ? 'text-green-500' : 'text-red-500';
                    const borderClass = data.type === 'income' ? 'border-green-500' : 'border-red-500';

                    const li = document.createElement('li');
                    li.className = `py-4 flex justify-between items-center border-l-4 pl-4 mb-2 bg-gray-50 rounded shadow-sm ${borderClass}`;
                    li.innerHTML = `
                        <div>
                            <p class="font-bold">${data.text}</p>
                            <p class="text-xs text-gray-500">${data.category}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-bold ${colorClass}">${sign}₹${data.amount}</span>
                            <button onclick="deleteTx('${txId}')" class="text-red-500">X</button>
                        </div>
                    `;
                    list.appendChild(li);
                });

                document.getElementById('total-income').innerText = `₹${income}`;
                document.getElementById('total-expense').innerText = `₹${expense}`;
                document.getElementById('total-balance').innerText = `₹${income - expense}`;
                drawChart(categoryTotals);
            });
        }

        window.deleteTx = async (id) => {
            if(confirm("Delete?")) await deleteDoc(doc(db, "transactions", id));
        }

        function drawChart(categoryTotals) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const labels = Object.keys(categoryTotals);
            const data = Object.values(categoryTotals);

            if (expenseChartInstance) expenseChartInstance.destroy();

            expenseChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels.length ? labels : ['None'],
                    datasets: [{ data: data.length ? data : [1], backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#e5e7eb'], borderWidth: 0 }]
                },
                options: { responsive: true, cutout: '70%' }
            });
        }
    </script>
</body>
</html>
